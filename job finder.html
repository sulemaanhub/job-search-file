<!DOCTYPE html>
<html>
<head>
<title>Real Job Finder</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

input{
padding:10px;
width:250px;
margin:10px;
}

button{
padding:10px 15px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.job{
background:white;
padding:15px;
margin:15px auto;
width:350px;
border-radius:10px;
text-align:left;
}

a{
text-decoration:none;
}
</style>

</head>

<body>

<h1>Job Finder</h1>

<p>Enter Skill or Job Title</p>

<input type="text" id="skill" placeholder="Example: developer">

<br>

<button onclick="findJobs()">Find Jobs</button>
<br>

<input type="text" id="skill" placeholder="Example: JavaScript">

<br>
<button onclick="findJobs()">Find Jobs</button>
<br>
<input type="text" id="skill" placeholder="Example: Python">

<br>
<button onclick="findJobs()">Find Jobs</button>
<br>
<input type="text" id="skill" placeholder="Example: CSS">

<br>
<button onclick="findJobs()">Find Jobs</button>
<br>
<input type="text" id="skill" placeholder="Example: html">

<br>
<button onclick="findJobs()">Find Jobs</button>
<br>

<div id="jobs"></div>

<script>

async function findJobs(){

let skill=document.getElementById("skill").value;

let response=await fetch("https://www.arbeitnow.com/api/job-board-api");

let data=await response.json();

let jobsHTML="";

data.data.forEach(job=>{

if(job.title.toLowerCase().includes(skill.toLowerCase())){

jobsHTML+=`

<div class="job">

<h3>${job.title}</h3>

<p><b>Company:</b> ${job.company_name}</p>

<p><b>Location:</b> ${job.location}</p>

<p><b>Job Type:</b> ${job.job_types}</p>

<a href="${job.url}" target="_blank">

<button>Apply</button>

</a>

</div>

`;

}

});

if(jobsHTML==""){
jobsHTML="<p>No jobs found</p>";
}

document.getElementById("jobs").innerHTML=jobsHTML;

}

</script>

</body>
</html>
